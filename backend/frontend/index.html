<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Educational Assessment Creator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📚 Assessment Creator</h1>

        <div class="form">

            <input type="text" id="subject" placeholder="Subject (e.g. Math)">
            <input type="number" id="grade_level" placeholder="Grade Level (e.g. 5)">
            <input type="text" id="topic" placeholder="Topic (e.g. Fractions)">

            <button onclick="generateAssessment()">Generate Assessment</button>

        </div>

        <div id="output"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
